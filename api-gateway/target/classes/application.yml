spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        # 用户服务路由
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
        # 内容服务路由
        - id: content-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/posts/**
            - Path=/api/v1/reports
        # 推荐/排序服务路由
        - id: rank-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/rank/**
        # 审核服务路由
        - id: audit-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/audit/**

server:
  port: 8080